<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>TIV-API Test Tool</title>
</head>
<body>
  <h1>TIV-API Test Tool</h1>

  <div>
    <label>Modo:</label>
    <select id="modeSelector">
      <option value="ascii">ASCII</option>
      <option value="ansi">ANSI</option>
      <option value="grey">GREY</option>
      <option value="256">256</option>
      <option value="rgb">RGB</option>
    </select>
  </div>

  <div id="optionsSection">
    <div id="optionsContainer"></div>
  </div>

  <hr>

  <div style="display: flex; gap: 20px;">
    <div>
      <h3>Por URL</h3>
      <input type="text" id="urlInput" placeholder="https://..." style="width: 300px;">
      <button onclick="processUrl()">Procesar URL</button>
      <div id="urlPreviewContainer" style="margin-top: 10px; display: none;">
        <img id="urlPreview" style="max-width: 400px; max-height: 400px; border: 1px solid #000;">
        <br>
        <a id="urlDownload" href="#" download>Descargar</a>
      </div>
      <div id="urlError" style="color: red; display: none;"></div>
    </div>

    <div>
      <h3>Por Archivo</h3>
      <input type="file" id="fileInput" accept=".png,.jpg,.jpeg,.gif,.webp,.bmp">
      <button onclick="processFile()">Subir y Procesar</button>
      <div id="filePreviewContainer" style="margin-top: 10px; display: none;">
        <img id="filePreview" style="max-width: 400px; max-height: 400px; border: 1px solid #000;">
        <br>
        <a id="fileDownload" href="#" download>Descargar</a>
      </div>
      <div id="fileError" style="color: red; display: none;"></div>
    </div>
  </div>

  <script>
    const modeSelector = document.getElementById('modeSelector');
    const optionsContainer = document.getElementById('optionsContainer');
    const urlInput = document.getElementById('urlInput');
    const fileInput = document.getElementById('fileInput');

    const optionConfigs = {
      ascii: [
        { id: 'columns', label: 'Columns', type: 'number', min: 20, max: 500, value: 80 },
        { id: 'density', label: 'Density', type: 'select', options: ['original', 'conservative', 'expanded', 'detailed', 'maximum'], value: 'original' },
        { id: 'luminance', label: 'Luminance', type: 'select', options: ['bt709', 'ntsc', 'gamma'], value: 'bt709' },
        { id: 'cellSize', label: 'Cell Size', type: 'number', min: 2, max: 32, value: 8 },
        { id: 'brightness', label: 'Brightness', type: 'number', min: -255, max: 255, value: 0 }
      ],
      ansi: [
        { id: 'columns', label: 'Columns', type: 'number', min: 20, max: 500, value: 80 },
        { id: 'colorMethod', label: 'Color Method', type: 'select', options: ['classic', 'perceptual', 'lab', 'cmc'], value: 'lab' },
        { id: 'dithering', label: 'Dithering', type: 'select', options: ['none', 'floyd-steinberg', 'atkinson', 'ordered'], value: 'none' },
        { id: 'cellSize', label: 'Cell Size', type: 'number', min: 2, max: 32, value: 8 },
        { id: 'brightness', label: 'Brightness', type: 'number', min: -255, max: 255, value: 0 }
      ],
      grey: [
        { id: 'columns', label: 'Columns', type: 'number', min: 20, max: 500, value: 80 },
        { id: 'dithering', label: 'Dithering', type: 'select', options: ['none', 'floyd-steinberg', 'atkinson', 'ordered'], value: 'none' },
        { id: 'cellSize', label: 'Cell Size', type: 'number', min: 2, max: 32, value: 8 },
        { id: 'brightness', label: 'Brightness', type: 'number', min: -255, max: 255, value: 0 }
      ],
      '256': [
        { id: 'columns', label: 'Columns', type: 'number', min: 20, max: 500, value: 80 },
        { id: 'colorMethod', label: 'Color Method', type: 'select', options: ['classic', 'perceptual', 'lab', 'cmc'], value: 'lab' },
        { id: 'dithering', label: 'Dithering', type: 'select', options: ['none', 'floyd-steinberg', 'atkinson', 'ordered'], value: 'none' },
        { id: 'cellSize', label: 'Cell Size', type: 'number', min: 2, max: 32, value: 8 },
        { id: 'brightness', label: 'Brightness', type: 'number', min: -255, max: 255, value: 0 }
      ],
      rgb: [
        { id: 'columns', label: 'Columns', type: 'number', min: 20, max: 500, value: 80 },
        { id: 'format', label: 'Format', type: 'select', options: ['png', 'jpg', 'jpeg'], value: 'png' },
        { id: 'dithering', label: 'Dithering', type: 'select', options: ['none', 'floyd-steinberg', 'atkinson', 'ordered'], value: 'none' },
        { id: 'cellSize', label: 'Cell Size', type: 'number', min: 2, max: 32, value: 8 },
        { id: 'brightness', label: 'Brightness', type: 'number', min: -255, max: 255, value: 0 }
      ]
    };

    function getCurrentOptions() {
      const mode = modeSelector.value;
      const config = optionConfigs[mode];
      const options = {};

      config.forEach(opt => {
        const el = document.getElementById('opt_' + opt.id);
        if (el) {
          options[opt.id] = opt.type === 'number' ? parseInt(el.value, 10) : el.value;
        }
      });

      return options;
    }

    function buildQueryString(options) {
      const params = [];
      for (const [key, value] of Object.entries(options)) {
        if (value !== null && value !== undefined && value !== '') {
          params.push(encodeURIComponent(key) + '=' + encodeURIComponent(value));
        }
      }
      return params.join('&');
    }

    function renderOptions() {
      const mode = modeSelector.value;
      const config = optionConfigs[mode];

      optionsContainer.innerHTML = '';

      config.forEach(opt => {
        const div = document.createElement('div');
        div.style.marginBottom = '5px';

        const label = document.createElement('label');
        label.textContent = opt.label + ': ';
        div.appendChild(label);

        if (opt.type === 'select') {
          const select = document.createElement('select');
          select.id = 'opt_' + opt.id;
          opt.options.forEach(o => {
            const option = document.createElement('option');
            option.value = o;
            option.textContent = o;
            if (o === opt.value) option.selected = true;
            select.appendChild(option);
          });
          div.appendChild(select);
        } else if (opt.type === 'number') {
          const input = document.createElement('input');
          input.type = 'number';
          input.id = 'opt_' + opt.id;
          input.min = opt.min;
          input.max = opt.max;
          input.value = opt.value;
          div.appendChild(input);
        }

        optionsContainer.appendChild(div);
      });
    }

    function showUrlError(msg) {
      const el = document.getElementById('urlError');
      el.textContent = msg;
      el.style.display = 'block';
      document.getElementById('urlPreviewContainer').style.display = 'none';
    }

    function showFileError(msg) {
      const el = document.getElementById('fileError');
      el.textContent = msg;
      el.style.display = 'block';
      document.getElementById('filePreviewContainer').style.display = 'none';
    }

    async function processUrl() {
      const url = urlInput.value.trim();
      if (!url) {
        showUrlError('Ingresa una URL');
        return;
      }

      const mode = modeSelector.value;
      const options = getCurrentOptions();
      const queryString = buildQueryString(options);
      const endpoint = `/api/image/${mode}/render/url${queryString ? '?' + queryString : ''}`;

      try {
        const response = await fetch(endpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url: url })
        });

        if (!response.ok) {
          const err = await response.json().catch(() => ({ error: 'Error desconocido' }));
          showUrlError('Error ' + response.status + ': ' + err.error);
          return;
        }

        const blob = await response.blob();
        const contentType = response.headers.get('content-type') || 'image/png';
        const ext = contentType.includes('jpeg') ? 'jpg' : 'png';
        const imageUrl = URL.createObjectURL(blob);

        document.getElementById('urlPreview').src = imageUrl;
        document.getElementById('urlDownload').href = imageUrl;
        document.getElementById('urlDownload').download = mode + '_' + Date.now() + '.' + ext;
        document.getElementById('urlPreviewContainer').style.display = 'block';
        document.getElementById('urlError').style.display = 'none';
      } catch (e) {
        showUrlError('Error de conexion: ' + e.message);
      }
    }

    async function processFile() {
      const file = fileInput.files[0];
      if (!file) {
        showFileError('Selecciona un archivo');
        return;
      }

      const mode = modeSelector.value;
      const options = getCurrentOptions();
      const queryString = buildQueryString(options);
      const endpoint = `/api/image/${mode}/render${queryString ? '?' + queryString : ''}`;

      try {
        const formData = new FormData();
        formData.append('image', file);

        const response = await fetch(endpoint, {
          method: 'POST',
          body: formData
        });

        if (!response.ok) {
          const err = await response.json().catch(() => ({ error: 'Error desconocido' }));
          showFileError('Error ' + response.status + ': ' + err.error);
          return;
        }

        const blob = await response.blob();
        const contentType = response.headers.get('content-type') || 'image/png';
        const ext = contentType.includes('jpeg') ? 'jpg' : 'png';
        const imageUrl = URL.createObjectURL(blob);

        document.getElementById('filePreview').src = imageUrl;
        document.getElementById('fileDownload').href = imageUrl;
        document.getElementById('fileDownload').download = mode + '_' + Date.now() + '.' + ext;
        document.getElementById('filePreviewContainer').style.display = 'block';
        document.getElementById('fileError').style.display = 'none';
      } catch (e) {
        showFileError('Error de conexion: ' + e.message);
      }
    }

    modeSelector.addEventListener('change', renderOptions);
    renderOptions();
  </script>
</body>
</html>
